<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dhanda-hq</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #1e1f22; --bg-mid: #383a40; --bg-light: #52555c;
            --text-primary: #f4f5f6; --text-secondary: #9ea3aa;
            --glass-bg: rgba(255,255,255,0.03); --glass-border: rgba(255,255,255,0.08);
            --glass-highlight: rgba(255,255,255,0.15);
            --metal-light: #f0f0f0; --metal-mid: #d1d3d6; --metal-dark: #a3a5a8;
            --shadow-ambient: 0 24px 48px rgba(0,0,0,0.2);
            --shadow-contact: 0 4px 12px rgba(0,0,0,0.15);
            --radius-panel: 48px; --radius-card: 20px; --radius-pill: 999px;
            --font-sans: 'Inter', -apple-system, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            background-color: var(--bg-deep);
            background-image:
                radial-gradient(circle at 0% 0%, var(--bg-mid) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, var(--bg-mid) 0%, transparent 50%),
                linear-gradient(135deg, var(--bg-deep) 0%, #111111 100%);
            color: var(--text-primary); font-family: var(--font-sans);
            min-height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        nav {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 32px; padding: 12px 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(120%); -webkit-backdrop-filter: blur(24px) saturate(120%);
            border: 1px solid var(--glass-border); border-top: 1px solid var(--glass-highlight);
            border-radius: var(--radius-pill); z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .logo { font-weight: 600; font-size: 14px; letter-spacing: -0.02em; display: flex; align-items: center; gap: 8px; }
        .logo::before {
            content: ''; display: block; width: 12px; height: 12px; border-radius: 50%;
            background: linear-gradient(135deg, var(--metal-light), var(--metal-dark));
            box-shadow: inset 0 1px 1px #fff, 0 1px 3px rgba(0,0,0,0.5);
        }
        .nav-links { display: flex; gap: 24px; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 13px; font-weight: 400; transition: color 0.2s ease; }
        .nav-links a:hover { color: var(--text-primary); }
        main {
            flex: 1; display: grid; grid-template-columns: 1fr 1.2fr;
            max-width: 1600px; margin: 0 auto; width: 100%; padding: 120px 80px 40px; gap: 80px;
        }
        .text-section { display: flex; flex-direction: column; justify-content: center; position: relative; z-index: 10; }
        .badge {
            display: inline-flex; align-items: center; padding: 6px 12px;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-pill); font-size: 12px; color: var(--text-secondary);
            margin-bottom: 24px; width: fit-content; letter-spacing: 0.04em; text-transform: uppercase;
        }
        h1 {
            font-size: 72px; line-height: 1.05; font-weight: 300; letter-spacing: -0.04em;
            margin-bottom: 24px; color: var(--text-primary);
            background: linear-gradient(180deg, #ffffff 0%, rgba(255,255,255,0.5) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        p.subhead {
            font-size: 20px; line-height: 1.5; color: var(--text-secondary); font-weight: 300;
            max-width: 480px; margin-bottom: 48px; letter-spacing: -0.01em;
        }
        .cta-group { display: flex; align-items: center; gap: 20px; }
        .btn-primary {
            display: flex; align-items: center; justify-content: center;
            width: 64px; height: 64px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--metal-light) 0%, var(--metal-mid) 50%, var(--metal-dark) 100%);
            border: none; cursor: pointer; position: relative;
            box-shadow: -4px -4px 12px rgba(255,255,255,0.05), 8px 8px 24px rgba(0,0,0,0.4),
                        inset -2px -2px 6px rgba(0,0,0,0.15), inset 2px 2px 6px rgba(255,255,255,0.9);
            transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s ease;
        }
        .btn-primary::after {
            content: ''; position: absolute; inset: -8px; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }
        .btn-primary svg { width: 24px; height: 24px; stroke: #111; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; filter: drop-shadow(0px 1px 0px rgba(255,255,255,0.4)); }
        .btn-primary:hover { transform: scale(1.05); }
        .btn-primary:active { transform: scale(0.95); }
        .cta-text { font-size: 14px; font-weight: 500; color: var(--text-primary); letter-spacing: -0.01em; }
        .canvas-section { position: relative; display: flex; align-items: center; justify-content: center; perspective: 1200px; }
        .spatial-backdrop {
            position: absolute; inset: 40px -40px -40px 40px;
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0.2) 100%);
            border-radius: var(--radius-panel); border-top: 1px solid rgba(255,255,255,0.06);
            border-left: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            box-shadow: -20px -20px 60px rgba(255,255,255,0.02), 40px 40px 80px rgba(0,0,0,0.4);
            transform: rotateY(-15deg) rotateX(5deg) translateZ(-100px); transform-style: preserve-3d; pointer-events: none;
        }
        .spatial-scene { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transform: rotateY(-15deg) rotateX(5deg); }
        .splines { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; transform: translateZ(0); }
        .spline-path { fill: none; stroke: rgba(255,255,255,0.15); stroke-width: 1.5; stroke-dasharray: 6 6; animation: flow 20s linear infinite; }
        .spline-glow { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 8; filter: blur(4px); }
        @keyframes flow { to { stroke-dashoffset: -100; } }
        .node {
            position: absolute; background: var(--glass-bg);
            backdrop-filter: blur(16px) saturate(150%); -webkit-backdrop-filter: blur(16px) saturate(150%);
            border: 1px solid var(--glass-border); border-top: 1px solid var(--glass-highlight);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-ambient), inset 0 1px 0 rgba(255,255,255,0.1);
            display: flex; flex-direction: column; z-index: 2;
            transition: transform 0.4s cubic-bezier(0.2,0.8,0.2,1);
        }
        .node:hover { transform: translateY(-8px) translateZ(40px); border-color: rgba(255,255,255,0.2); }
        .card-video { width: 200px; height: 120px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; }
        .card-video-header { display: flex; align-items: center; gap: 8px; }
        .avatar { width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,0.1); }
        .card-title { height: 4px; width: 60%; background: rgba(255,255,255,0.2); border-radius: 2px; }
        .card-meta { height: 4px; width: 40%; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 6px; }
        .play-indicator {
            align-self: flex-end; width: 24px; height: 24px; border-radius: 50%;
            background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .play-indicator::after {
            content: ''; width: 0; height: 0; border-style: solid;
            border-width: 4px 0 4px 6px; border-color: transparent transparent transparent #fff; margin-left: 2px;
        }
        .node-1 { top: 10%; left: 10%; transform: translateZ(20px); animation: float 6s ease-in-out infinite; }
        .node-2 { top: 60%; left: 5%; transform: translateZ(40px); animation: float 8s ease-in-out infinite 1s; }
        .node-3 { top: 15%; right: 15%; transform: translateZ(30px); animation: float 7s ease-in-out infinite 2s; }
        .node-4 { top: 70%; right: 10%; transform: translateZ(10px); animation: float 9s ease-in-out infinite 0.5s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) translateZ(var(--tz, 20px)); }
            50% { transform: translateY(-12px) translateZ(var(--tz, 20px)); }
        }
        .node-insight {
            top: 50%; left: 50%; transform: translate(-50%, -50%) translateZ(80px);
            width: 140px; height: 140px; border-radius: 50%; background: var(--glass-bg);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 32px 64px rgba(0,0,0,0.4), inset 0 2px 4px rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center; z-index: 10;
        }
        .insight-core {
            width: 80px; height: 80px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--metal-light) 0%, var(--metal-mid) 60%, var(--metal-dark) 100%);
            box-shadow: -4px -4px 12px rgba(255,255,255,0.05), 8px 8px 24px rgba(0,0,0,0.3),
                        inset -2px -2px 6px rgba(0,0,0,0.2), inset 2px 2px 6px rgba(255,255,255,0.9);
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .insight-core::before {
            content: ''; position: absolute; inset: -12px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1); animation: pulse 4s cubic-bezier(0.4,0,0.6,1) infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        .insight-core svg { width: 32px; height: 32px; stroke: #111; stroke-width: 1.5; fill: none; filter: drop-shadow(0px 1px 0px rgba(255,255,255,0.5)); }
        .meta-label {
            position: absolute; font-size: 10px; font-family: monospace;
            color: rgba(255,255,255,0.4); letter-spacing: 0.1em; pointer-events: none;
        }
        .lbl-1 { bottom: -24px; left: 50%; transform: translateX(-50%); }
        .lbl-2 { top: -24px; right: -20px; }
        @media (max-width: 1024px) {
            main { grid-template-columns: 1fr; padding: 100px 40px; gap: 60px; }
            .canvas-section { height: 500px; }
            .spatial-scene { transform: none; }
            .spatial-backdrop { transform: none; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">dhanda-hq</div>
        <div class="nav-links">
            <a href="#">Platform</a>
            <a href="#">Use Cases</a>
            <a href="#">Pricing</a>
        </div>
    </nav>
    <main>
        <section class="text-section">
            <div class="badge">System Active_</div>
            <h1>dhanda-hq</h1>
            <p class="subhead">Welcome to dhanda-hq</p>
            <div class="cta-group">
                <button class="btn-primary" aria-label="Start">
                    <svg viewBox="0 0 24 24"><path d="M12 4v16m0-16l-4 4m4-4l4 4"></path></svg>
                </button>
                <span class="cta-text">Get Started</span>
            </div>
        </section>
        <section class="canvas-section">
            <div class="spatial-backdrop"></div>
            <div class="spatial-scene">
                <svg class="splines" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice">
                    <path class="spline-glow" d="M160 120 C 300 120, 200 300, 300 300"></path>
                    <path class="spline-path" d="M160 120 C 300 120, 200 300, 300 300"></path>
                    <path class="spline-glow" d="M130 420 C 250 420, 200 300, 300 300"></path>
                    <path class="spline-path" d="M130 420 C 250 420, 200 300, 300 300"></path>
                    <path class="spline-glow" d="M410 150 C 350 150, 400 300, 300 300"></path>
                    <path class="spline-path" d="M410 150 C 350 150, 400 300, 300 300"></path>
                    <path class="spline-glow" d="M440 480 C 350 480, 400 300, 300 300"></path>
                    <path class="spline-path" d="M440 480 C 350 480, 400 300, 300 300"></path>
                </svg>
                <div class="node card-video node-1" style="--tz: 30px;">
                    <div class="card-video-header"><div class="avatar"></div><div style="flex:1"><div class="card-title"></div><div class="card-meta"></div></div></div>
                    <div class="play-indicator"></div><div class="meta-label lbl-1">NODE_01</div>
                </div>
                <div class="node card-video node-2" style="--tz: 10px;">
                    <div class="card-video-header"><div class="avatar"></div><div style="flex:1"><div class="card-title"></div><div class="card-meta"></div></div></div>
                    <div class="play-indicator"></div><div class="meta-label lbl-1">NODE_02</div>
                </div>
                <div class="node card-video node-3" style="--tz: 40px;">
                    <div class="card-video-header"><div class="avatar"></div><div style="flex:1"><div class="card-title"></div><div class="card-meta"></div></div></div>
                    <div class="play-indicator"></div><div class="meta-label lbl-1">NODE_03</div>
                </div>
                <div class="node card-video node-4" style="--tz: 20px;">
                    <div class="card-video-header"><div class="avatar"></div><div style="flex:1"><div class="card-title"></div><div class="card-meta"></div></div></div>
                    <div class="play-indicator"></div><div class="meta-label lbl-1">NODE_04</div>
                </div>
                <div class="node-insight">
                    <div class="meta-label lbl-2">CORE_NODE</div>
                    <div class="insight-core">
                        <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path d="M9 12l2 2 4-4"></path></svg>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body></html>
